<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>Restaurant Finder</h1></header>
<main>
    <section class="search-box">
        <input type="text" id="postcode" placeholder="Enter postcode (e.g. EC4M7RF, SW1A1AA)" maxlength="10">
        <button id="search">Search</button>
    </section>
    <div id="error"></div>
    <div id="results"></div>
</main>
<script src="app.js"></script>
</body>
</html>
